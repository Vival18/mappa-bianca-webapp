<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mappa Bianca WebApp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info { position: absolute; bottom: 10px; left: 10px; background: white; padding: 5px 10px; z-index: 1000; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info">Mappa Bianca – Caricamento...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Qui caricherai markers.json e inizializzerai la mappa
        fetch('markers.json')
            .then(response => response.json())
            .then(data => {
                console.log('Marker caricati:', data);
                document.querySelector('.info').innerHTML = `Mappa Bianca – ${data.length} punti di interesse`;
                // Inizializza mappa (lo faremo nella Fase 1)
            })
            .catch(err => {
                console.error(err);
                document.querySelector('.info').innerHTML = 'Errore nel caricamento dei dati';
            });
    </script>
</body>
</html>
